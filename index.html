/* INIT */
window.onload = () => {
  let c = document.getElementById("cultivo");
  Object.keys(data).forEach(x => {
    c.innerHTML += `<option>${x}</option>`;
  });
  loadPlagas();
};

function loadPlagas() {
  let c = document.getElementById("cultivo").value;
  let p = document.getElementById("plaga");
  p.innerHTML = "";
  data[c].forEach(pl => {
    p.innerHTML += `<option value="${pl.name}|${pl.common}|${pl.desc}|${pl.stage}">
      ${pl.common}
    </option>`;
  });
}

function IA(nivel) {
  if (nivel.includes("🟢")) return "🟢 Monitoreo + biocontrol";
  if (nivel.includes("🟡")) return "🟡 Manejo integrado + rotación";
  return "🔴 Intervención química + EED";
}

function generar() {
  let c = document.getElementById("cultivo").value;
  let v = document.getElementById("plaga").value.split("|");
  let n = document.getElementById("nivel").value;

  let [name, common, desc, stage] = v;
  let plaga = data[c].find(p => p.name === name);

  let txt = `
AGROAI IPM – CHILE X PRO EXTENDED
----------------------------------
CULTIVO: ${c}
PLAGA: ${common}
NOMBRE CIENTÍFICO: ${name}
----------------------------------
DESCRIPCIÓN:
  ${desc}

ESTADIO CLAVE:
  ${stage}

CONTROL QUÍMICO:
${plaga.chem.map(x => "  • " + x).join("\n")}

CONTROL BIOLÓGICO:
${plaga.bio.map(x => "  • " + x).join("\n")}

CONTROL AGRONÓMICO:
  • ${plaga.agro}

RECOMENDACIÓN IPM (IA):
  ${IA(n)}

✅ INFORME GENERADO PARA CAMPO 
  `;

  document.getElementById("out").innerText = txt;
}

function exportPDF() {
  const { jsPDF } = window.jspdf;
  let c = document.getElementById("cultivo").value;
  let v = document.getElementById("plaga").value.split("|") || [];
  let name = v[0] || "plaga";

  let doc = new jsPDF();
  let text = document.getElementById("out").innerText;

  doc.setFontSize(10);
  doc.setFont("courier");                 // monoespaciada para mejor alineación
  doc.text("AGROAI IPM CHILE X PRO EXTENDED", 10, 10);
  doc.text(doc.splitTextToSize(text, 180), 10, 20);
  doc.save(`IPM_${c}_${name}.pdf`);      // nombre dinámico según cultivo/plaga
}
